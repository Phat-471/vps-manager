name: Auto Release on Push to Main

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: v$VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.version }} does not exist, will create."
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Lấy commit message gần nhất làm description
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes "## VPS Manager ${{ steps.version.outputs.version }}

          **Cập nhật tự động từ nhánh main**

          ### Thay đổi:
          $COMMIT_MSG

          ### Cách cập nhật:
          Vào **Bảo trì hệ thống → Kiểm tra → Cập nhật Panel ngay**
          
          > Hệ thống sẽ tự động tải và cài đặt phiên bản mới này." \
            --latest
          
          echo "✅ Release ${{ steps.version.outputs.version }} created successfully!"
